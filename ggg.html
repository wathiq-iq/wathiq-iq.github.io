<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الاختبارات التفاعلي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1, h2 { color: #333; margin-bottom: 16px; text-align: center; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: #10b981; color: white; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        
        input { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; margin-bottom: 12px; }
        
        .option-btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-align: right;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            color: white;
            font-weight: 500;
            margin-bottom: 12px;
            width: 100%;
        }
        
        .option-btn.correct { background: #10b981; }
        .option-btn.incorrect { background: #ef4444; }
        .option-btn.neutral { background: #d1d5db; color: #6b7280; }
        
        .feedback {
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: 600;
        }
        .feedback.correct { background: #d1fae5; color: #065f46; }
        .feedback.incorrect { background: #fee2e2; color: #991b1b; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="app"></div>
    </div>

    <script>
        const defaultQuestions = [
            { question: "ما هي عاصمة العراق؟", options: ["بغداد", "دمشق", "عمان", "بيروت"], correctAnswer: "بغداد" },
            { question: "من هو مؤلف كتاب كليلة ودمنة؟", options: ["الجاحظ", "ابن المقفع", "المتنبي", "ابن خلدون"], correctAnswer: "ابن المقفع" },
            { question: "في أي قارة تقع مصر؟", options: ["آسيا", "أفريقيا", "أوروبا", "أمريكا"], correctAnswer: "أفريقيا" },
            { question: "ما هو أطول نهر في العالم؟", options: ["النيل", "الأمازون", "المسيسيبي", "دجلة"], correctAnswer: "النيل" },
            { question: "كم عدد أضلاع المسدس؟", options: ["5", "6", "7", "8"], correctAnswer: "6" }
        ];

        const API_URL = 'https://gist.githubusercontent.com/wathiq-iq/649e0972ae9108b238313a5c882bd52e/raw/questions.json';

        let state = {
            questions: [],
            currentIndex: 0,
            score: 0,
            showResult: false,
            feedback: null,
            selectedQuestions: [],
            quizStarted: false,
            isLoading: true
        };

        function shuffleArray(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        async function loadQuestions() {
            try {
                const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(API_URL)}`);
                state.questions = await response.json();
            } catch {
                state.questions = defaultQuestions;
            }
            state.isLoading = false;
            render();
        }

        function startQuiz() {
            const num = parseInt(document.getElementById('numInput').value) || 5;
            state.selectedQuestions = shuffleArray(state.questions).slice(0, num);
            state.quizStarted = true;
            state.currentIndex = 0;
            state.score = 0;
            state.showResult = false;
            render();
        }

        function handleAnswer(answer) {
            const correct = answer === state.selectedQuestions[state.currentIndex].correctAnswer;
            if (correct) state.score++;
            state.feedback = { correct, correctAnswer: state.selectedQuestions[state.currentIndex].correctAnswer };
            render();
        }

        function nextQuestion() {
            if (state.currentIndex + 1 < state.selectedQuestions.length) {
                state.currentIndex++;
                state.feedback = null;
            } else {
                state.showResult = true;
            }
            render();
        }

        function resetQuiz() {
            state.quizStarted = false;
            state.showResult = false;
            state.feedback = null;
            render();
        }

        function render() {
            const app = document.getElementById('app');
            
            if (state.isLoading) {
                app.innerHTML = '<div class="card"><div class="spinner"></div><h2>جاري التحميل...</h2></div>';
                return;
            }

            if (!state.quizStarted) {
                app.innerHTML = `
                    <div class="card">
                        <h1>🎯 تطبيق الاختبارات</h1>
                        <p>عدد الأسئلة المتاحة: ${state.questions.length}</p>
                        <input type="number" id="numInput" value="5" min="1" max="${state.questions.length}" placeholder="عدد الأسئلة">
                        <button class="btn btn-warning" onclick="startQuiz()">🚀 ابدأ الاختبار</button>
                    </div>
                `;
                return;
            }

            if (state.showResult) {
                const percentage = (state.score / state.selectedQuestions.length * 100).toFixed(1);
                app.innerHTML = `
                    <div class="card">
                        <h1>🏁 النتيجة</h1>
                        <h2 style="font-size: 48px; color: #667eea;">${percentage}%</h2>
                        <p style="font-size: 24px;">${state.score} من ${state.selectedQuestions.length}</p>
                        <button class="btn btn-success" onclick="resetQuiz()">🔄 اختبار جديد</button>
                    </div>
                `;
                return;
            }

            const q = state.selectedQuestions[state.currentIndex];
            app.innerHTML = `
                <div class="card">
                    <p>السؤال ${state.currentIndex + 1} من ${state.selectedQuestions.length} | النقاط: ${state.score}</p>
                    <h2 style="text-align: right; margin: 20px 0;">${q.question}</h2>
                    ${q.options.map(opt => {
                        let className = 'option-btn';
                        if (state.feedback) {
                            if (opt === q.correctAnswer) className += ' correct';
                            else if (opt === state.feedback.correctAnswer) className += ' incorrect';
                            else className += ' neutral';
                        }
                        return `<button class="${className}" onclick="handleAnswer('${opt}')" ${state.feedback ? 'disabled' : ''}>${opt}</button>`;
                    }).join('')}
                    ${state.feedback ? `<div class="feedback ${state.feedback.correct ? 'correct' : 'incorrect'}">
                        ${state.feedback.correct ? '✔️ صحيح!' : '✗ خطأ! الصحيح: ' + state.feedback.correctAnswer}
                    </div>` : ''}
                    ${state.feedback ? `<button class="btn btn-blue" onclick="nextQuestion()">➡️ التالي</button>` : ''}
                </div>
            `;
        }

        loadQuestions();
    </script>
</body>
</html>
